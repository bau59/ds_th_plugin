bump_interval_hours_default:
  default: 0
  type: integer
  min: 0
  description: "Default cooldown (hours) between bump actions. 0 disables cooldown."

group_bump_intervals_structured:
  default: []
  type: objects
  description: "Preferred per-group cooldown rules configured via group picker."
  schema:
    name: group_bump_interval
    properties:
      groups:
        type: groups
        required: true
      interval_hours:
        type: integer
        required: true
        validations:
          min: 0

group_bump_intervals:
  default: ""
  type: string
  description: "Legacy format: group_or_id:hours|group2:hours (kept for backward compatibility)."

show_success_modal:
  default: true
  type: bool
  description: "Show a modal confirmation after a successful bump request."
